<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EINKAFFEE — La Cumbrecita</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a}
.app{max-width:680px;margin:0 auto;padding:1.25rem 1rem 4rem}
h1,h2,h3{font-weight:500}
input,select,button{font-family:inherit}
input[type=number],input[type=date],input[type=text],input[type=password],input[type=month],input[type=datetime-local],select{width:100%;padding:8px 10px;border:0.5px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;outline:none;background:#fff}
input:focus,select:focus{border-color:#aaa}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:16px;padding:16px 18px;margin-bottom:14px}
.metric{border-radius:14px;padding:12px 14px;flex:1;min-width:0}
.metric .ml{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.metric .mv{font-size:17px;font-weight:500}
.metric .ms{font-size:11px;color:#888;margin-top:3px}
.metrics{display:flex;gap:8px;margin-bottom:12px}
.bar-track{flex:1;height:6px;background:#e5e5e5;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block}
.lbl{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.btn{padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:#fff}
.btn-outline{background:transparent;border:0.5px solid #ddd;color:#555;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer}
.tab-btn{padding:7px 12px;font-size:12px;white-space:nowrap;border-radius:99px;cursor:pointer;border:0.5px solid #ddd;background:transparent;color:#888}
.tab-btn.active{background:#F59E0B;color:#fff;border-color:#F59E0B;font-weight:500}
.sub-btn{padding:6px 14px;font-size:12px;border-radius:99px;cursor:pointer;border:0.5px solid #ddd;background:transparent;color:#888;white-space:nowrap;text-transform:capitalize}
.sub-btn.active{background:#3B82F6;color:#fff;border-color:#3B82F6;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:20px;padding:1.5rem;width:340px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box h3{font-size:16px;font-weight:500;margin-bottom:14px;color:#1a1a1a}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid #f0f0f0}
.list-row:last-child{border-bottom:none}
.del-btn{font-size:12px;padding:2px 8px;border:.5px solid #fca5a5;border-radius:6px;background:transparent;color:#EF4444;cursor:pointer}
.status{font-size:10px;font-weight:500}
.emp-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.checkin-btn{padding:13px 24px;font-size:14px;font-weight:500;cursor:pointer;border:none;border-radius:14px;color:#fff}
.tabs-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px}
.turno-btn{flex:1;padding:8px 0;font-size:12px;font-weight:500;border:none;border-radius:10px;cursor:pointer;position:relative}
.medio-box{border-radius:12px;padding:10px 12px}
.medio-box .ml2{font-size:11px;font-weight:500;margin-bottom:5px}
.medio-box input{background:transparent;border:none;border-radius:0;padding:2px 0;font-size:16px;font-weight:500;width:100%;outline:none}
.bar-balance{margin-bottom:10px}
.bar-balance .bl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bar-balance .bt{height:7px;background:#e5e5e5;border-radius:99px;overflow:hidden}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<div class="app" id="app">
  <div style="text-align:center;padding:2rem">
    <div style="font-size:36px">☕</div>
    <p style="color:#F59E0B;font-size:20px;font-weight:700;letter-spacing:.15em;margin:8px 0 4px">EINKAFFEE</p>
    <p style="color:#888;font-size:12px">Conectando...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyA0Ulhpz4X2X823w_C16duwMt6asinJPeI",
  authDomain:"cafe-cumbrecita.firebaseapp.com",
  projectId:"cafe-cumbrecita",
  storageBucket:"cafe-cumbrecita.firebasestorage.app",
  messagingSenderId:"268620258519",
  appId:"1:268620258519:web:25cf01ff874cc3a55fe492"
};
const app = initializeApp(FB);
const db = getFirestore(app);

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const TURNOS=["Mañana","Almuerzo","Tarde"];
const TURNO_COLOR={Mañana:"#F59E0B",Almuerzo:"#EF4444",Tarde:"#8B5CF6"};
const MEDIOS=["Efectivo","Tarjeta","QR"];
const MEDIO_COLOR={Efectivo:"#10B981",Tarjeta:"#3B82F6",QR:"#F59E0B"};
const MEDIO_ICON={Efectivo:"💵",Tarjeta:"💳",QR:"📱"};
const MEDIO_PAGO=["Efectivo","Transferencia"];
const AREAS=["Salón","Cocina"];
const AREA_COLOR={Salón:"#F59E0B",Cocina:"#EF4444"};
const AREA_BG={Salón:"#FEF3C7",Cocina:"#FEE2E2"};
const GASTO_CATS=["Materias primas","Café especialidad","Personal","Servicios","Alquiler","Mantenimiento","Marketing","Impuestos y tasas"];
const CAT_COLOR={"Materias primas":"#10B981","Café especialidad":"#F59E0B","Personal":"#3B82F6","Servicios":"#8B5CF6","Alquiler":"#EF4444","Mantenimiento":"#F97316","Marketing":"#EC4899","Impuestos y tasas":"#6B7280"};
const RETIRO_CATS=["Casa","Auto","Tarjetas de crédito","Almacén","Farmacia","Cuota alimentos","Combustible","Ropa","Salud","Educación","Entretenimiento","Otros"];
const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const VAC_ANUALES=15, SEMANAS_ANIO=50, DIA_LIBRE=4;
const JORNADA_REDUCIDA=["Trifon","Ceci"];
const EMPLEADOS_INIT=[
  ...["Ivana","Cufo","Fiona","Cande","Sofi","Mai","Mili"].map((n,i)=>({id:"e"+(i+1),nombre:n,area:"Salón",tipo:"fijo",sueldoMensual:0,valorHora:0,valorHoraExtra:0,vacaciones:[],activo:true})),
  ...["Dalma","Dani","Trifon","Ceci","Hernando","Gustavo","Irma"].map((n,i)=>({id:"e"+(i+8),nombre:n,area:"Cocina",tipo:"fijo",sueldoMensual:0,valorHora:0,valorHoraExtra:0,vacaciones:[],activo:true})),
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt=n=>Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD=n=>Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const moneda=n=>"$"+Math.round(n||0).toLocaleString("es-AR");
const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const thisMonth=()=>today().slice(0,7);
const turnoTotal=t=>(t?.Efectivo||0)+(t?.Tarjeta||0)+(t?.QR||0);
const diffH=(a,b)=>a&&b?Math.max(0,(new Date(b)-new Date(a))/3600000):0;
const isoFecha=iso=>iso?new Date(iso).toLocaleDateString("es-AR"):"";
const isoHora=iso=>iso?new Date(iso).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}):"";
const mesLabel=ym=>{const[y,m]=ym.split("-");return new Date(y,m-1).toLocaleDateString("es-AR",{month:"long",year:"numeric"});};
const jornadaEmp=emp=>JORNADA_REDUCIDA.includes(emp.nombre)?4:8;
const pill=(txt,color,bg)=>`<span class="pill" style="background:${bg||color+'22'};color:${color}">${txt}</span>`;

const horasEsperadasMes=(emp,ym)=>{
  const[y,m]=ym.split("-").map(Number),diasMes=new Date(y,m,0).getDate();
  let diasLab=0;
  for(let d=1;d<=diasMes;d++){if(new Date(y,m-1,d).getDay()!==DIA_LIBRE)diasLab++;}
  const semsAprox=Math.ceil(diasMes/7),jornada=jornadaEmp(emp);
  return Math.max(0,diasLab*jornada-semsAprox*(jornada===4?2:4));
};

const enVacaciones=(emp,fecha)=>(emp.vacaciones||[]).some(v=>fecha>=v.desde&&fecha<=v.hasta);

const diasVacacionesMes=(emp,ym)=>{
  const[y,m]=ym.split("-").map(Number),p1=new Date(y,m-1,1),p2=new Date(y,m,0);let c=0;
  (emp.vacaciones||[]).forEach(v=>{const d=new Date(Math.max(new Date(v.desde),p1)),h=new Date(Math.min(new Date(v.hasta),p2));if(d<=h)c+=Math.round((h-d)/86400000)+1;});return c;
};
const diasVacacionesAnio=(emp,anio)=>{
  let c=0;(emp.vacaciones||[]).forEach(v=>{const d=new Date(Math.max(new Date(v.desde),new Date(`${anio}-01-01`))),h=new Date(Math.min(new Date(v.hasta),new Date(`${anio}-12-31`)));if(d<=h)c+=Math.round((h-d)/86400000)+1;});return c;
};
const semanasTranscurridasAnio=anio=>{
  const hoy=new Date(),ref=hoy.getFullYear()===Number(anio)?hoy:new Date(`${anio}-12-31`);
  return Math.min(SEMANAS_ANIO,Math.floor((ref-new Date(`${anio}-01-01`))/(7*86400000))+1);
};

const resumenMes=(emp,registros,mes)=>{
  const regs=registros.filter(r=>r.empId===emp.id&&r.fecha?.startsWith(mes));
  const turnos=regs.filter(r=>r.tipo==="turno"&&r.salida);
  const horas=turnos.reduce((s,r)=>s+diffH(r.entrada,r.salida),0);
  const esperadas=horasEsperadasMes(emp,mes);
  return{horas,esperadas,extra:Math.max(0,horas-esperadas),diasTrabajados:new Set(turnos.map(r=>r.fecha)).size,francos:regs.filter(r=>r.tipo==="franco").length,medios:regs.filter(r=>r.tipo==="medio_franco").length,faltasInj:regs.filter(r=>r.tipo==="falta_injustificada").length,faltasJust:regs.filter(r=>r.tipo==="falta_justificada").length,diasVac:diasVacacionesMes(emp,mes),turnos};
};

const saldoAcumulado=(empId,hastaYM,empleados,registros,movimientos)=>{
  const emp=empleados.find(e=>e.id===empId);if(!emp)return 0;
  const todos=[...registros.filter(r=>r.empId===empId&&r.fecha).map(r=>r.fecha.slice(0,7)),...movimientos.filter(m=>m.empId===empId).map(m=>m.mes)];
  if(!todos.length)return 0;
  let saldo=0,cur=todos.sort()[0];
  while(cur<=hastaYM){
    const r=resumenMes(emp,registros,cur);
    const liq=emp.tipo==="fijo"?(emp.sueldoMensual||0)+r.extra*(emp.valorHoraExtra||0):r.horas*(emp.valorHora||0);
    const movs=movimientos.filter(m=>m.empId===empId&&m.mes===cur);
    saldo+=liq-movs.filter(m=>m.tipo==="adelanto").reduce((s,m)=>s+m.monto,0)-movs.filter(m=>m.tipo==="pago").reduce((s,m)=>s+m.monto,0);
    const[y,m2]=cur.split("-").map(Number);cur=m2===12?`${y+1}-01`:`${y}-${String(m2+1).padStart(2,"0")}`;
  }
  return saldo;
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let STATE={
  modo:"publico", publicTab:"checkin", adminTab:"caja", personalSubTab:"asistencia",
  pin: localStorage.getItem("einkaffee_pin")||"1234",
  pinInput:"", pinError:false,
  dias:{}, gastos:[], retiros:[], empleados:[], registros:[], movimientos:[],
  connOk:false,
  // caja
  cajFecha:today(), cajTurno:"Mañana", cajEditando:{}, cajForms:{Mañana:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""},Almuerzo:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""},Tarde:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""}},
  // gastos form
  gForm:{fecha:today(),categoria:"Materias primas",empleadoId:"",descripcion:"",monto:"",tipo:"Variable"},
  // retiros form
  rForm:{fecha:today(),categoria:"Casa",descripcion:"",monto:""},
  // personal
  persMes:thisMonth(), persAnio:String(new Date().getFullYear()),
  modalEmp:null, modalFalta:null, modalVac:null, modalVacDesde:"", modalVacHasta:"",
  modalMov:null, modalMovTipo:"adelanto", modalMovMonto:"", modalMovNota:"", modalMovMedio:"Efectivo",
  editReg:null, histEmpId:null, checkinSel:null, checkinFeedback:null,
  // balance
  balMes:thisMonth(),
};

const R=()=>render(document.getElementById("app"));

// ── FIREBASE SAVE HELPERS ─────────────────────────────────────────────────────
const saveDia=async(fecha,data)=>setDoc(doc(db,"dias",fecha),{...data,updatedAt:new Date().toISOString()});
const delDia=async f=>deleteDoc(doc(db,"dias",f));
const saveGasto=async(id,data)=>setDoc(doc(db,"gastos",String(id)),{...data});
const delGasto=async id=>deleteDoc(doc(db,"gastos",String(id)));
const saveRetiro=async(id,data)=>setDoc(doc(db,"retiros",String(id)),{...data});
const delRetiro=async id=>deleteDoc(doc(db,"retiros",String(id)));
const saveEmpleado=async(id,data)=>setDoc(doc(db,"empleados",String(id)),{...data});
const delEmpleado=async id=>deleteDoc(doc(db,"empleados",String(id)));
const saveRegistro=async(id,data)=>setDoc(doc(db,"registros",String(id)),{...data});
const delRegistro=async id=>deleteDoc(doc(db,"registros",String(id)));
const saveMovimiento=async(id,data)=>setDoc(doc(db,"movimientos",String(id)),{...data});
const delMovimiento=async id=>deleteDoc(doc(db,"movimientos",String(id)));
const savePin=p=>{localStorage.setItem("einkaffee_pin",p);STATE.pin=p;};

// ── FIREBASE LISTENERS ────────────────────────────────────────────────────────
const initFirebase=async()=>{
  onSnapshot(collection(db,"dias"),snap=>{STATE.dias={};snap.forEach(s=>STATE.dias[s.id]=s.data());STATE.connOk=true;R();},()=>{STATE.connOk=false;R();});
  onSnapshot(collection(db,"gastos"),snap=>{STATE.gastos=[];snap.forEach(s=>STATE.gastos.push({id:s.id,...s.data()}));STATE.gastos.sort((a,b)=>a.fecha<b.fecha?1:-1);R();});
  onSnapshot(collection(db,"retiros"),snap=>{STATE.retiros=[];snap.forEach(s=>STATE.retiros.push({id:s.id,...s.data()}));STATE.retiros.sort((a,b)=>a.fecha<b.fecha?1:-1);R();});
  onSnapshot(collection(db,"empleados"),snap=>{
    if(snap.empty){EMPLEADOS_INIT.forEach(e=>saveEmpleado(e.id,e));STATE.empleados=[...EMPLEADOS_INIT];}
    else{STATE.empleados=[];snap.forEach(s=>STATE.empleados.push({vacaciones:[],valorHoraExtra:0,...s.data(),id:s.id}));}
    R();
  });
  onSnapshot(collection(db,"registros"),snap=>{STATE.registros=[];snap.forEach(s=>STATE.registros.push({id:s.id,...s.data()}));R();});
  onSnapshot(collection(db,"movimientos"),snap=>{STATE.movimientos=[];snap.forEach(s=>STATE.movimientos.push({id:s.id,...s.data()}));R();});
};
initFirebase();

// ── EVENT HANDLER ─────────────────────────────────────────────────────────────
document.addEventListener("click",async e=>{
  const t=e.target.closest("[data-action]");if(!t)return;
  const a=t.dataset.action,v=t.dataset.val,v2=t.dataset.val2;

  if(a==="set-public-tab"){STATE.publicTab=v;R();}
  else if(a==="set-admin-tab"){STATE.adminTab=v;R();}
  else if(a==="set-pers-subtab"){STATE.personalSubTab=v;R();}
  else if(a==="go-login"){STATE.modo="login";STATE.pinInput="";STATE.pinError=false;R();}
  else if(a==="go-public"){STATE.modo="publico";STATE.pinInput="";STATE.pinError=false;R();}
  else if(a==="do-login"){
    if(STATE.pinInput===STATE.pin){STATE.modo="admin";STATE.pinError=false;STATE.pinInput="";}
    else{STATE.pinError=true;STATE.pinInput="";}
    R();
  }
  else if(a==="pin-key"){
    if(v==="⌫")STATE.pinInput=STATE.pinInput.slice(0,-1);
    else if(STATE.pinInput.length<6)STATE.pinInput+=v;
    R();
  }
  // CAJA
  else if(a==="caj-set-turno"){STATE.cajTurno=v;R();}
  else if(a==="caj-editar-turno"){STATE.cajEditando={...STATE.cajEditando,[v]:true};R();}
  else if(a==="caj-guardar-turno"){
    const f=STATE.cajForms[v];
    const td={cubiertos:parseInt(f.cubiertos)||0,Efectivo:parseFloat(f.Efectivo)||0,Tarjeta:parseFloat(f.Tarjeta)||0,QR:parseFloat(f.QR)||0};
    const diaAct=STATE.dias[STATE.cajFecha]||{turnos:{}};
    const nt={...(diaAct.turnos||{}),[v]:td};
    const ingresos=TURNOS.reduce((s,t2)=>s+turnoTotal(nt[t2]),0);
    await saveDia(STATE.cajFecha,{ingresos,turnos:nt});
    STATE.cajEditando={...STATE.cajEditando,[v]:false};R();
  }
  // GASTOS
  else if(a==="guardar-gasto"){
    const f=STATE.gForm;
    if(!f.monto)return;
    const id=Date.now();
    await saveGasto(id,{...f,monto:parseFloat(f.monto)||0,id:String(id)});
    STATE.gForm={fecha:today(),categoria:"Materias primas",empleadoId:"",descripcion:"",monto:"",tipo:"Variable"};R();
  }
  else if(a==="del-gasto"){await delGasto(v);R();}
  // RETIROS
  else if(a==="guardar-retiro"){
    const f=STATE.rForm;if(!f.monto)return;
    const id=Date.now();
    await saveRetiro(id,{...f,monto:parseFloat(f.monto)||0,id:String(id)});
    STATE.rForm={fecha:today(),categoria:"Casa",descripcion:"",monto:""};R();
  }
  else if(a==="del-retiro"){await delRetiro(v);R();}
  // EMPLEADOS
  else if(a==="open-modal-emp"){
    const emp=v==="new"?{nombre:"",area:"Salón",tipo:"fijo",sueldoMensual:0,valorHora:0,valorHoraExtra:0,activo:true}:{...STATE.empleados.find(e=>e.id===v)};
    STATE.modalEmp=emp;R();
  }
  else if(a==="close-modal-emp"){STATE.modalEmp=null;R();}
  else if(a==="guardar-emp"){
    const e=STATE.modalEmp;if(!e.nombre.trim())return;
    const id=e.id||("e"+Date.now());
    await saveEmpleado(id,{...e,id});
    STATE.modalEmp=null;R();
  }
  else if(a==="toggle-activo"){
    const emp=STATE.empleados.find(e=>e.id===v);
    await saveEmpleado(v,{...emp,activo:!emp.activo});R();
  }
  // VACACIONES
  else if(a==="open-modal-vac"){STATE.modalVac=STATE.empleados.find(e=>e.id===v);STATE.modalVacDesde="";STATE.modalVacHasta="";R();}
  else if(a==="close-modal-vac"){STATE.modalVac=null;R();}
  else if(a==="add-vac"){
    if(!STATE.modalVacDesde||!STATE.modalVacHasta)return;
    const vacs=[...(STATE.modalVac.vacaciones||[]),{id:Date.now(),desde:STATE.modalVacDesde,hasta:STATE.modalVacHasta}];
    STATE.modalVac={...STATE.modalVac,vacaciones:vacs};R();
  }
  else if(a==="del-vac"){
    STATE.modalVac={...STATE.modalVac,vacaciones:(STATE.modalVac.vacaciones||[]).filter(x=>String(x.id)!==v)};R();
  }
  else if(a==="guardar-vac"){
    await saveEmpleado(STATE.modalVac.id,STATE.modalVac);STATE.modalVac=null;R();
  }
  // FALTA
  else if(a==="open-modal-falta"){STATE.modalFalta=STATE.empleados.find(e=>e.id===v);R();}
  else if(a==="close-modal-falta"){STATE.modalFalta=null;R();}
  else if(a==="confirmar-falta"){
    const emp=STATE.modalFalta,tipo=`falta_${v}`,hoy=today();
    if(!STATE.registros.find(r=>r.empId===emp.id&&r.fecha===hoy&&(r.tipo==="falta_injustificada"||r.tipo==="falta_justificada"))){
      const id=Date.now();await saveRegistro(id,{id:String(id),empId:emp.id,tipo,fecha:hoy,entrada:null,salida:null});
    }
    STATE.modalFalta=null;R();
  }
  // ASISTENCIA ADMIN
  else if(a==="fichar-admin"){
    const empId=v,tipo=v2,hoy=today(),now=new Date().toISOString(),id=Date.now();
    if(tipo==="entrada"&&!STATE.registros.find(r=>r.empId===empId&&!r.salida&&r.tipo==="turno"))
      await saveRegistro(id,{id:String(id),empId,tipo:"turno",fecha:hoy,entrada:now,salida:null});
    else if(tipo==="salida"){const ab=[...STATE.registros].reverse().find(r=>r.empId===empId&&r.tipo==="turno"&&!r.salida);if(ab)await saveRegistro(ab.id,{...ab,salida:now});}
    else if(!STATE.registros.find(r=>r.empId===empId&&r.fecha===hoy&&r.tipo===tipo))
      await saveRegistro(id,{id:String(id),empId,tipo,fecha:hoy,entrada:null,salida:null});
    R();
  }
  // EDITAR REGISTRO
  else if(a==="open-edit-reg"){STATE.editReg={...STATE.registros.find(r=>r.id===v)};R();}
  else if(a==="close-edit-reg"){STATE.editReg=null;R();}
  else if(a==="guardar-edit-reg"){await saveRegistro(STATE.editReg.id,STATE.editReg);STATE.editReg=null;R();}
  else if(a==="del-reg"){await delRegistro(v);R();}
  // MOVIMIENTO
  else if(a==="open-modal-mov"){STATE.modalMov={empId:v,mes:v2};STATE.modalMovTipo="adelanto";STATE.modalMovMonto="";STATE.modalMovNota="";STATE.modalMovMedio="Efectivo";R();}
  else if(a==="close-modal-mov"){STATE.modalMov=null;R();}
  else if(a==="set-mov-tipo"){STATE.modalMovTipo=v;R();}
  else if(a==="set-mov-medio"){STATE.modalMovMedio=v;R();}
  else if(a==="guardar-mov"){
    if(!Number(STATE.modalMovMonto))return;
    const id=Date.now(),emp=STATE.empleados.find(e=>e.id===STATE.modalMov.empId);
    await saveMovimiento(id,{id:String(id),empId:STATE.modalMov.empId,mes:STATE.modalMov.mes,tipo:STATE.modalMovTipo,monto:Number(STATE.modalMovMonto),nota:STATE.modalMovNota,medioPago:STATE.modalMovMedio,fecha:today()});
    STATE.modalMov=null;R();
  }
  else if(a==="del-mov"){await delMovimiento(v);R();}
  // HISTORIAL PAGOS
  else if(a==="set-hist-emp"){STATE.histEmpId=v==="null"?null:v;R();}
  // CHECK-IN
  else if(a==="checkin-sel"){STATE.checkinSel=v==="null"?null:v;R();}
  else if(a==="checkin-fichar"){
    const empId=STATE.checkinSel,tipo=v,hoy=today(),now=new Date().toISOString(),id=Date.now();
    if(tipo==="entrada"&&!STATE.registros.find(r=>r.empId===empId&&!r.salida&&r.tipo==="turno"))
      await saveRegistro(id,{id:String(id),empId,tipo:"turno",fecha:hoy,entrada:now,salida:null});
    else if(tipo==="salida"){const ab=[...STATE.registros].reverse().find(r=>r.empId===empId&&r.tipo==="turno"&&!r.salida);if(ab)await saveRegistro(ab.id,{...ab,salida:now});}
    else if(!STATE.registros.find(r=>r.empId===empId&&r.fecha===hoy&&r.tipo===tipo))
      await saveRegistro(id,{id:String(id),empId,tipo,fecha:hoy,entrada:null,salida:null});
    const nombre=STATE.empleados.find(e=>e.id===empId)?.nombre;
    const labels={entrada:"Entrada registrada",salida:"Salida registrada",franco:"Franco registrado",medio_franco:"½ Franco registrado",falta_injustificada:"Falta registrada"};
    STATE.checkinFeedback={nombre,label:labels[tipo]||"Registrado"};
    STATE.checkinSel=null;
    setTimeout(()=>{STATE.checkinFeedback=null;R();},2500);
    R();
  }
  // CAJA FECHA
  else if(a==="caj-set-fecha"){
    STATE.cajFecha=document.getElementById("caj-fecha")?.value||today();
    STATE.cajEditando={};
    STATE.cajForms={Mañana:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""},Almuerzo:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""},Tarde:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""}};
    const d=STATE.dias[STATE.cajFecha];
    if(d) TURNOS.forEach(t=>{if(d.turnos?.[t])STATE.cajForms[t]={cubiertos:d.turnos[t].cubiertos?.toString()||"",Efectivo:d.turnos[t].Efectivo?.toString()||"",Tarjeta:d.turnos[t].Tarjeta?.toString()||"",QR:d.turnos[t].QR?.toString()||""};});
    R();
  }
  // CONFIG PIN
  else if(a==="guardar-pin"){
    const nuevo=document.getElementById("pin-nuevo")?.value,conf=document.getElementById("pin-confirm")?.value;
    const msg=document.getElementById("pin-msg");
    if(!nuevo||nuevo.length<4||!/^\d+$/.test(nuevo)){if(msg)msg.textContent="Mínimo 4 dígitos numéricos.";return;}
    if(nuevo!==conf){if(msg)msg.textContent="Los PINs no coinciden.";return;}
    savePin(nuevo);if(msg){msg.textContent="✓ PIN actualizado";msg.style.color="#10B981";}
  }
  // PERS MES/ANIO
  else if(a==="set-pers-mes"){STATE.persMes=document.getElementById("pers-mes")?.value||thisMonth();R();}
  else if(a==="set-pers-anio"){STATE.persAnio=document.getElementById("pers-anio")?.value||String(new Date().getFullYear());R();}
  else if(a==="set-bal-mes"){STATE.balMes=document.getElementById("bal-mes")?.value||thisMonth();R();}
});

// Inputs en tiempo real
document.addEventListener("input",e=>{
  const t=e.target,a=t.dataset.bind;if(!a)return;
  const parts=a.split(".");
  if(parts[0]==="cajForms"&&parts.length===3)STATE.cajForms[parts[1]][parts[2]]=t.value;
  else if(parts[0]==="gForm")STATE.gForm[parts[1]]=t.value;
  else if(parts[0]==="rForm")STATE.rForm[parts[1]]=t.value;
  else if(parts[0]==="modalEmp"&&STATE.modalEmp)STATE.modalEmp[parts[1]]=parts[1]==="sueldoMensual"||parts[1]==="valorHora"||parts[1]==="valorHoraExtra"?Number(t.value):t.value;
  else if(parts[0]==="modalVacDesde")STATE.modalVacDesde=t.value;
  else if(parts[0]==="modalVacHasta")STATE.modalVacHasta=t.value;
  else if(parts[0]==="modalMovMonto")STATE.modalMovMonto=t.value;
  else if(parts[0]==="modalMovNota")STATE.modalMovNota=t.value;
  else if(parts[0]==="editReg"&&STATE.editReg)STATE.editReg[parts[1]]=t.value?new Date(t.value).toISOString():null;
  else if(parts[0]==="pinInput")STATE.pinInput=t.value;
  // render solo para subtotal caja
  if(parts[0]==="cajForms")renderCajSubtotal();
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(el){
  if(STATE.modo==="publico")el.innerHTML=renderPublico();
  else if(STATE.modo==="login")el.innerHTML=renderLogin();
  else el.innerHTML=renderAdmin();
  attachSelects();
}

function attachSelects(){
  // Select changes (not covered by input event for select)
  document.querySelectorAll("select[data-bind]").forEach(s=>{
    s.addEventListener("change",e=>{
      const parts=e.target.dataset.bind.split(".");
      if(parts[0]==="gForm")STATE.gForm[parts[1]]=e.target.value;
      else if(parts[0]==="rForm")STATE.rForm[parts[1]]=e.target.value;
      else if(parts[0]==="modalEmp"&&STATE.modalEmp)STATE.modalEmp[parts[1]]=e.target.value;
      R();
    },{once:true});
  });
}

// ── PERSONAL ──────────────────────────────────────────────────────────────────
function renderPersonal(){
  const SUBTABS=["asistencia","empleados","resumen","balance","liquidación","pagos"];
  return `<div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto">
    ${SUBTABS.map(s=>`<button data-action="set-pers-subtab" data-val="${s}" class="sub-btn ${STATE.personalSubTab===s?"active":""}">${s}</button>`).join("")}
  </div>
  ${STATE.personalSubTab==="asistencia"?renderAsistencia():
    STATE.personalSubTab==="empleados"?renderEmpleados():
    STATE.personalSubTab==="resumen"?renderResumen():
    STATE.personalSubTab==="balance"?renderBalanceAnual():
    STATE.personalSubTab==="liquidación"?renderLiquidacion():
    renderPagos()}`;
}

function renderAsistencia(){
  const hoy=today();
  const regsHoy=id=>STATE.registros.filter(r=>r.empId===id&&r.fecha===hoy);
  const estaAdentro=id=>STATE.registros.some(r=>r.empId===id&&r.tipo==="turno"&&!r.salida);
  const estadoHoy=id=>{const emp=STATE.empleados.find(e=>e.id===id);if(enVacaciones(emp,hoy))return"vacaciones";const r=regsHoy(id);if(r.some(x=>x.tipo==="franco"))return"franco";if(r.some(x=>x.tipo==="falta_injustificada"))return"falta_injustificada";if(r.some(x=>x.tipo==="falta_justificada"))return"falta_justificada";return null;};
  const tieneMedio=id=>regsHoy(id).some(r=>r.tipo==="medio_franco");
  return AREAS.map(area=>`
    <p style="font-size:12px;font-weight:500;color:${AREA_COLOR[area]};text-transform:uppercase;margin:0 0 10px">${area}</p>
    ${STATE.empleados.filter(e=>e.area===area&&e.activo!==false).map(e=>{
      const dentro=estaAdentro(e.id),hoy2=estadoHoy(e.id),medio=tieneMedio(e.id),enVac=hoy2==="vacaciones";
      return `<div class="card" style="padding:12px 14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="emp-avatar" style="background:${dentro?"#D1FAE5":enVac?"#EDE9FE":hoy2?.startsWith("falta")?"#FEE2E2":AREA_BG[area]};color:${dentro?"#059669":enVac?"#7C3AED":hoy2?.startsWith("falta")?"#DC2626":AREA_COLOR[area]}">${e.nombre.slice(0,2).toUpperCase()}</div>
          <div style="flex:1">
            <p style="margin:0;font-weight:500;font-size:14px">${e.nombre}</p>
            <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">
              ${dentro?pill("● Trabajando","#059669","#D1FAE5"):""}
              ${hoy2==="franco"?pill("Franco","#2563EB","#DBEAFE"):""}
              ${hoy2==="falta_injustificada"?pill("Falta inj.","#DC2626","#FEE2E2"):""}
              ${hoy2==="falta_justificada"?pill("Falta just.","#92400E","#FEF3C7"):""}
              ${medio?pill("½ Franco","#92400E","#FEF3C7"):""}
              ${enVac?pill("Vacaciones","#7C3AED","#EDE9FE"):""}
            </div>
          </div>
        </div>
        ${!enVac?`<div style="display:flex;gap:5px;flex-wrap:wrap">
          ${!dentro&&!hoy2?.startsWith("falta")&&hoy2!=="franco"?`<button data-action="fichar-admin" data-val="${e.id}" data-val2="entrada" class="btn" style="background:#10B981;padding:6px 12px;font-size:12px">Entrada</button>`:""}
          ${dentro?`<button data-action="fichar-admin" data-val="${e.id}" data-val2="salida" class="btn" style="background:#EF4444;padding:6px 12px;font-size:12px">Salida</button>`:""}
          ${hoy2!=="franco"&&!hoy2?.startsWith("falta")?`<button data-action="fichar-admin" data-val="${e.id}" data-val2="franco" class="btn" style="background:#3B82F6;padding:6px 12px;font-size:12px">Franco</button>`:""}
          ${e.tipo==="fijo"&&!medio?`<button data-action="fichar-admin" data-val="${e.id}" data-val2="medio_franco" class="btn" style="background:#F59E0B;padding:6px 12px;font-size:12px">½ Franco</button>`:""}
          ${e.tipo==="fijo"&&!dentro&&!hoy2?.startsWith("falta")&&hoy2!=="franco"?`<button data-action="open-modal-falta" data-val="${e.id}" style="padding:6px 12px;font-size:12px;cursor:pointer;background:#FEE2E2;border:none;border-radius:8px;color:#DC2626">Falta</button>`:""}
        </div>`:""}
      </div>`;
    }).join("")}`).join("");
}

  ${AREAS.map(area=>`
    <p style="font-size:12px;font-weight:500;color:${AREA_COLOR[area]};text-transform:uppercase;margin:12px 0 8px">${area}</p>
    ${STATE.empleados.filter(e=>e.area===area).map(e=>`
      <div class="card" style="padding:12px 14px;margin-bottom:10px;opacity:${e.activo===false?.5:1}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="emp-avatar" style="background:${AREA_BG[area]};color:${AREA_COLOR[area]}">${e.nombre.slice(0,2).toUpperCase()}</div>
          <div style="flex:1">
            <p style="margin:0;font-weight:500;font-size:14px">${e.nombre}</p>
            <p style="margin:0;font-size:12px;color:#888">${e.tipo==="fijo"?`Fijo · ${e.sueldoMensual?moneda(e.sueldoMensual)+"/mes":"sin sueldo"} · ${jornadaEmp(e)}hs/día`:`Temporario · ${e.valorHora?moneda(e.valorHora)+"/h":"sin valor/h"}`}</p>
          </div>

    <p style="font-size:13px;font-weight:500;margin:0">Resumen mensual</p>
    <input type="month" id="pers-mes" value="${STATE.persMes}" data-action="set-pers-mes" style="margin-left:auto;width:auto;font-size:13px">
  </div>
  ${AREAS.map(area=>`
    <p style="font-size:12px;font-weight:500;color:${AREA_COLOR[area]};text-transform:uppercase;margin:0 0 8px">${area}</p>
    ${STATE.empleados.filter(e=>e.area===area&&e.activo!==false).map(e=>{
      const r=resumenMes(e,STATE.registros,STATE.persMes);
      return `<div class="card">
        <div style="display:flex;align-items:center;margin-bottom:8px">
          <div class="emp-avatar" style="background:${AREA_BG[area]};color:${AREA_COLOR[area]};margin-right:10px">${e.nombre.slice(0,2).toUpperCase()}</div>
          <span style="flex:1;font-weight:500;font-size:14px">${e.nombre}</span>
          <div style="text-align:right">
            <p style="margin:0;font-size:13px;font-weight:500">${r.horas.toFixed(1)}h <span style="color:#888;font-size:11px">/ ${r.esperadas.toFixed(0)}h esp.</span></p>
            ${r.extra>0?`<p style="margin:0;font-size:11px;color:#F59E0B;font-weight:500">+${r.extra.toFixed(1)}h extra</p>`:""}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
          ${pill("Francos: "+r.francos,"#2563EB","#DBEAFE")}
          ${pill("½ Franco: "+r.medios,"#92400E","#FEF3C7")}
          ${r.faltasInj>0?pill("Faltas inj: "+r.faltasInj,"#DC2626","#FEE2E2"):""}
          ${r.faltasJust>0?pill("Faltas just: "+r.faltasJust,"#92400E","#FEF3C7"):""}
          ${r.diasVac>0?pill("Vacaciones: "+r.diasVac+"d","#7C3AED","#EDE9FE"):""}
        </div>
        ${r.turnos.map(tu=>`<div style="display:flex;gap:6px;font-size:12px;padding:4px 0;border-top:.5px solid #f0f0f0;align-items:center">
          <span style="min-width:80px;font-weight:500">${isoFecha(tu.fecha)}</span>
          <span style="flex:1;color:#888">${isoHora(tu.entrada)} → ${isoHora(tu.salida)}</span>
          <span style="font-weight:500">${diffH(tu.entrada,tu.salida).toFixed(1)}h</span>
          <button data-action="open-edit-reg" data-val="${tu.id}" style="padding:2px 8px;font-size:11px;cursor:pointer;border:.5px solid #ddd;border-radius:6px;background:transparent">Editar</button>
          <button data-action="del-reg" data-val="${tu.id}" style="padding:2px 8px;font-size:11px;cursor:pointer;background:#FEE2E2;border:none;border-radius:6px;color:#DC2626">✕</button>
        </div>`).join("")}
      </div>`;
    }).join("")}`).join("")}`;
}

function renderBalanceAnual(){
  const anio=STATE.persAnio;
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <p style="font-size:13px;font-weight:500;margin:0">Balance anual</p>
    <select id="pers-anio" data-action="set-pers-anio" style="margin-left:auto;width:auto;font-size:13px">
      ${[2023,2024,2025,2026,2027].map(y=>`<option ${String(y)===anio?"selected":""}>${y}</option>`).join("")}
    </select>
  </div>
  ${STATE.empleados.filter(e=>e.tipo==="fijo"&&e.activo!==false).map(e=>{
    const regsAnio=STATE.registros.filter(r=>r.empId===e.id&&r.fecha?.startsWith(anio));
    const turnos=regsAnio.filter(r=>r.tipo==="turno"&&r.salida);
    const horasAnio=turnos.reduce((s,r)=>s+diffH(r.entrada,r.salida),0);
    const francosUsados=regsAnio.filter(r=>r.tipo==="franco").length;
    const mediosUsados=regsAnio.filter(r=>r.tipo==="medio_franco").length;
    const vacUsadas=diasVacacionesAnio(e,anio);
    const semanas=semanasTranscurridasAnio(anio);
    const saldoF=semanas-francosUsados,saldoM=semanas-mediosUsados,saldoV=VAC_ANUALES-vacUsadas;
    const faltasInj=regsAnio.filter(r=>r.tipo==="falta_injustificada").length;
    const diasTrab=new Set(turnos.map(r=>r.fecha)).size;
    return `<div class="card">
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <div class="emp-avatar" style="background:${AREA_BG[e.area]};color:${AREA_COLOR[e.area]};margin-right:10px">${e.nombre.slice(0,2).toUpperCase()}</div>
        <div style="flex:1"><p style="margin:0;font-weight:500;font-size:14px">${e.nombre}</p><p style="margin:0;font-size:12px;color:#888">${e.area} · ${diasTrab}d · ${horasAnio.toFixed(0)}h</p></div>
      </div>
      ${barBalance("Francos ("+semanas+" esperados)",francosUsados,semanas)}
      ${barBalance("Medios francos ("+semanas+" esperados)",mediosUsados,semanas)}
      ${barBalance("Vacaciones ("+VAC_ANUALES+" días)",vacUsadas,VAC_ANUALES,"#7C3AED")}
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        ${saldoF<0?pill(Math.abs(saldoF)+" francos en deuda","#DC2626","#FEE2E2"):""}
        ${saldoF>0?pill(saldoF+" francos disponibles","#059669","#D1FAE5"):""}
        ${saldoV>0?pill(saldoV+"d vac. pendientes","#7C3AED","#EDE9FE"):""}
        ${faltasInj>0?pill(faltasInj+" faltas inj.","#DC2626","#FEE2E2"):""}
      </div>
    </div>`;
  }).join("")}`;
}

function renderLiquidacion(){
  const mes=STATE.persMes;
  const totalDev=STATE.empleados.filter(e=>e.activo!==false).reduce((s,e)=>{const r=resumenMes(e,STATE.registros,mes);return s+(e.tipo==="fijo"?(e.sueldoMensual||0)+r.extra*(e.valorHoraExtra||0):r.horas*(e.valorHora||0));},0);
  const totalPend=STATE.empleados.filter(e=>e.activo!==false).reduce((s,e)=>s+saldoAcumulado(e.id,mes,STATE.empleados,STATE.registros,STATE.movimientos),0);
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <p style="font-size:13px;font-weight:500;margin:0">Liquidación</p>
    <input type="month" id="pers-mes" value="${mes}" data-action="set-pers-mes" style="margin-left:auto;width:auto;font-size:13px">
  </div>
  <div class="metrics">${metricCard("Total devengado",moneda(totalDev),"#F59E0B")}${metricCard("Saldo pendiente",moneda(totalPend),"#EF4444")}</div>
  ${AREAS.map(area=>`
    <p style="font-size:12px;font-weight:500;color:${AREA_COLOR[area]};text-transform:uppercase;margin:0 0 8px">${area}</p>
    ${STATE.empleados.filter(e=>e.area===area&&e.activo!==false).map(e=>{
      const r=resumenMes(e,STATE.registros,mes);
      const liqBase=e.tipo==="fijo"?(e.sueldoMensual||0):r.horas*(e.valorHora||0);
      const liqExtra=r.extra*(e.valorHoraExtra||0);
      const liq=liqBase+liqExtra;
      const movsMes=STATE.movimientos.filter(m=>m.empId===e.id&&m.mes===mes);
      const adelantos=movsMes.filter(m=>m.tipo==="adelanto").reduce((s,m)=>s+m.monto,0);
      const pagos=movsMes.filter(m=>m.tipo==="pago").reduce((s,m)=>s+m.monto,0);
      const saldo=saldoAcumulado(e.id,mes,STATE.empleados,STATE.registros,STATE.movimientos);
      return `<div class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div class="emp-avatar" style="background:${AREA_BG[area]};color:${AREA_COLOR[area]}">${e.nombre.slice(0,2).toUpperCase()}</div>
          <div style="flex:1">
            <p style="margin:0;font-weight:500;font-size:14px">${e.nombre}</p>
            <p style="margin:0;font-size:12px;color:#888">${r.horas.toFixed(1)}h trabajadas · ${r.esperadas.toFixed(0)}h esperadas${r.extra>0?` · ${r.extra.toFixed(1)}h extra`:""}</p>
          </div>
          <button data-action="open-modal-mov" data-val="${e.id}" data-val2="${mes}" class="btn" style="background:#10B981;padding:6px 12px;font-size:12px">+ Movimiento</button>
        </div>
        <div style="background:#f5f5f0;border-radius:10px;padding:10px 12px;margin-bottom:8px">
          ${[[`Sueldo base`,liqBase,"#1a1a1a",true],
             ...(r.extra>0?[[`Hs. extra (${r.extra.toFixed(1)}h × ${moneda(e.valorHoraExtra||0)})`,liqExtra,"#F59E0B",false]]:[]),
             ["Adelantos",-adelantos,"#DC2626",false],
             ["Pagos",-pagos,"#059669",false]
          ].map(([label,val,color,bold])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid #e5e5e5">
            <span style="font-size:13px;color:#888">${label}</span>
            <span style="font-size:13px;font-weight:${bold?500:400};color:${color}">${val>=0?moneda(val):"-"+moneda(Math.abs(val))}</span>
          </div>`).join("")}
          <div style="display:flex;justify-content:space-between;padding:8px 0 0">
            <span style="font-size:14px;font-weight:500">Saldo pendiente</span>
            <span style="font-size:16px;font-weight:500;color:${saldo>0?"#DC2626":"#059669"}">${saldo>0?moneda(saldo):"-"+moneda(Math.abs(saldo))}</span>
          </div>
        </div>
        ${movsMes.map(m=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;border-top:.5px solid #f5f5f5">
          ${pill(m.tipo==="adelanto"?"Adelanto":"Pago",m.tipo==="adelanto"?"#DC2626":"#059669",m.tipo==="adelanto"?"#FEE2E2":"#D1FAE5")}
          ${m.medioPago?pill(m.medioPago,"#3B82F6","#EFF6FF"):""}
          <span style="flex:1;color:#888">${m.nota||""}</span>
          <span style="font-weight:500;color:${m.tipo==="adelanto"?"#DC2626":"#059669"}">${moneda(m.monto)}</span>
          <button data-action="del-mov" data-val="${m.id}" style="padding:2px 7px;font-size:11px;cursor:pointer;background:transparent;border:none;color:#DC2626">✕</button>
        </div>`).join("")}
      </div>`;
    }).join("")}`).join("")}`;
}

function renderPagos(){
  if(STATE.histEmpId){
    const emp=STATE.empleados.find(e=>e.id===STATE.histEmpId);
    const movs=[...STATE.movimientos.filter(m=>m.empId===STATE.histEmpId)].sort((a,b)=>a.fecha<b.fecha?1:-1);
    const totalPag=movs.filter(m=>m.tipo==="pago").reduce((s,m)=>s+m.monto,0);
    const totalAd=movs.filter(m=>m.tipo==="adelanto").reduce((s,m)=>s+m.monto,0);
    return `<button data-action="set-hist-emp" data-val="null" style="font-size:13px;color:#888;background:none;border:none;cursor:pointer;margin-bottom:14px">← Volver</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div class="emp-avatar" style="width:44px;height:44px;font-size:14px;background:${AREA_BG[emp?.area]};color:${AREA_COLOR[emp?.area]}">${emp?.nombre.slice(0,2).toUpperCase()}</div>
      <div><p style="margin:0;font-weight:500;font-size:16px">${emp?.nombre}</p><p style="margin:0;font-size:12px;color:#888">${emp?.area}</p></div>
    </div>
    <div class="metrics">${metricCard("Total pagado",moneda(totalPag),"#10B981")}${metricCard("Total adelantado",moneda(totalAd),"#EF4444")}</div>
    <div class="card">
      ${movs.length===0?`<p style="font-size:13px;color:#888">Sin movimientos</p>`:""}
      ${movs.map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:.5px solid #f0f0f0">
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            ${pill(m.tipo==="adelanto"?"Adelanto":"Pago",m.tipo==="adelanto"?"#DC2626":"#059669",m.tipo==="adelanto"?"#FEE2E2":"#D1FAE5")}
            ${m.medioPago?pill(m.medioPago,"#3B82F6","#EFF6FF"):""}
            <span style="font-size:11px;color:#aaa">${mesLabel(m.mes)}</span>
          </div>
          ${m.nota?`<p style="font-size:12px;color:#888;margin:0">${m.nota}</p>`:""}
          <span style="font-size:11px;color:#aaa">${isoFecha(m.fecha)}</span>
        </div>
        <span style="font-size:15px;font-weight:500;color:${m.tipo==="adelanto"?"#DC2626":"#059669"}">${moneda(m.monto)}</span>
      </div>`).join("")}
    </div>`;
  }
  return `<p style="font-size:13px;font-weight:500;margin:0 0 14px">Historial de pagos</p>
  ${STATE.empleados.filter(e=>e.activo!==false).map(e=>{
    const movs=STATE.movimientos.filter(m=>m.empId===e.id);
    const totalPag=movs.filter(m=>m.tipo==="pago").reduce((s,m)=>s+m.monto,0);
    const totalAd=movs.filter(m=>m.tipo==="adelanto").reduce((s,m)=>s+m.monto,0);
    return `<div class="card" style="cursor:pointer" data-action="set-hist-emp" data-val="${e.id}">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="emp-avatar" style="background:${AREA_BG[e.area]};color:${AREA_COLOR[e.area]}">${e.nombre.slice(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <p style="margin:0;font-weight:500;font-size:14px">${e.nombre}</p>
          <p style="margin:0;font-size:12px;color:#888">${movs.length} movimientos · Pagos: ${moneda(totalPag)} · Adelantos: ${moneda(totalAd)}</p>
        </div>
        <span style="font-size:18px;color:#ccc">›</span>
      </div>
    </div>`;
  }).join("")}`;
}

// ── BALANCE ───────────────────────────────────────────────────────────────────
function renderBalance(){
  const mes=STATE.balMes;
  const mesesDisp=[...new Set([...Object.keys(STATE.dias),...STATE.gastos.map(g=>g.fecha),...STATE.retiros.map(r=>r.fecha)].map(f=>f.slice(0,7)))].sort().reverse();
  if(!mesesDisp.includes(mes))mesesDisp.unshift(mes);
  const diasMes=Object.entries(STATE.dias).filter(([f])=>f.startsWith(mes));
  const gastosMes=STATE.gastos.filter(g=>g.fecha?.startsWith(mes));
  const retirosMes=STATE.retiros.filter(r=>r.fecha?.startsWith(mes));
  const totalIng=diasMes.reduce((s,[,v])=>s+v.ingresos,0);
  const totalGas=gastosMes.reduce((s,g)=>s+g.monto,0);
  const totalRet=retirosMes.reduce((s,r)=>s+r.monto,0);
  const cub={Mañana:0,Almuerzo:0,Tarde:0},medios={Efectivo:0,Tarjeta:0,QR:0};
  diasMes.forEach(([,v])=>{TURNOS.forEach(t=>{cub[t]+=v.turnos?.[t]?.cubiertos||0;MEDIOS.forEach(m=>medios[m]+=v.turnos?.[t]?.[m]||0);});});
  const totCub=TURNOS.reduce((s,t)=>s+cub[t],0);
  const ganancia=totalIng-totalGas-totalRet,margen=totalIng>0?(ganancia/totalIng)*100:0;
  const gasF=gastosMes.filter(g=>g.tipo==="Fijo").reduce((s,g)=>s+g.monto,0);
  const gasV=gastosMes.filter(g=>g.tipo==="Variable").reduce((s,g)=>s+g.monto,0);
  const gasC={},retC={};
  GASTO_CATS.forEach(c=>gasC[c]=gastosMes.filter(g=>g.categoria===c).reduce((s,g)=>s+g.monto,0));
  RETIRO_CATS.forEach(c=>retC[c]=retirosMes.filter(r=>r.categoria===c).reduce((s,r)=>s+r.monto,0));
  return `<div style="display:flex;align-items:center;margin-bottom:14px">
    <p style="font-size:14px;font-weight:500;margin:0">Balance</p>
    <select id="bal-mes" data-action="set-bal-mes" style="margin-left:auto;width:auto;font-size:13px">
      ${mesesDisp.map(m=>{const[y,mo]=m.split("-");return`<option value="${m}" ${m===mes?"selected":""}>${MESES[parseInt(mo)-1]} ${y}</option>`;}).join("")}
    </select>
  </div>
  <div class="metrics">${metricCard("Ingresos","$"+fmt(totalIng),"#10B981")}${metricCard("Gastos","$"+fmt(totalGas),"#EF4444")}</div>
  <div class="metrics">${metricCard("Retiros","$"+fmt(totalRet),"#8B5CF6")}${metricCard("Resultado","$"+fmt(ganancia),ganancia>=0?"#10B981":"#EF4444",fmtD(margen)+"% de margen")}</div>
  <div class="metrics">${metricCard("Ticket prom.","$"+fmtD(totCub>0?totalIng/totCub:0),"#F59E0B",fmt(totCub)+" cubiertos")}${metricCard("Fijos","$"+fmt(gasF),"#3B82F6")}${metricCard("Variables","$"+fmt(gasV),"#F97316")}</div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Medios de cobro</p>
    ${MEDIOS.map(m=>`<div class="bar-row">
      <span style="font-size:13px;min-width:68px">${MEDIO_ICON[m]} <span style="color:${MEDIO_COLOR[m]};font-weight:500">${m}</span></span>
      <div class="bar-track"><div class="bar-fill" style="width:${totalIng>0?medios[m]/totalIng*100:0}%;background:${MEDIO_COLOR[m]}"></div></div>
      <div style="text-align:right;min-width:90px"><span style="font-size:13px;font-weight:500">$${fmt(medios[m])}</span> <span style="font-size:11px;color:#888">${totalIng>0?fmtD(medios[m]/totalIng*100):0}%</span></div>
    </div>`).join("")}
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Cubiertos por turno</p>
    ${TURNOS.map(t=>`<div class="bar-row">
      <span style="font-size:12px;color:${TURNO_COLOR[t]};font-weight:500;min-width:60px">${t}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${totCub>0?cub[t]/totCub*100:0}%;background:${TURNO_COLOR[t]}"></div></div>
      <span style="font-size:13px;font-weight:500;min-width:28px;text-align:right">${fmt(cub[t])}</span>
    </div>`).join("")}
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Gastos por categoría</p>
    ${GASTO_CATS.filter(c=>gasC[c]>0).map(c=>`<div class="bar-row">
      <div class="dot" style="background:${CAT_COLOR[c]}"></div>
      <span style="font-size:13px;color:#888;min-width:120px">${c}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${totalGas>0?gasC[c]/totalGas*100:0}%;background:${CAT_COLOR[c]}"></div></div>
      <span style="font-size:13px;font-weight:500;min-width:60px;text-align:right">$${fmt(gasC[c])}</span>
    </div>`).join("")}
  </div>
  ${totalRet>0?`<div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Retiros por categoría</p>
    ${RETIRO_CATS.filter(c=>retC[c]>0).map(c=>`<div class="bar-row">
      <div class="dot" style="background:#8B5CF6"></div>
      <span style="font-size:13px;color:#888;min-width:120px">${c}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${totalRet>0?retC[c]/totalRet*100:0}%;background:#8B5CF6"></div></div>
      <span style="font-size:13px;font-weight:500;min-width:60px;text-align:right">$${fmt(retC[c])}</span>
    </div>`).join("")}
  </div>`:""}`;
}

// ── TENDENCIAS ────────────────────────────────────────────────────────────────
function renderTendencias(){
  const porDia=Object.entries(STATE.dias).map(([f,v])=>{const gd=STATE.gastos.filter(g=>g.fecha===f).reduce((s,g)=>s+g.monto,0),tot=TURNOS.reduce((s,t)=>s+(v.turnos?.[t]?.cubiertos||0),0);return{fecha:f,ingresos:v.ingresos,ganancia:v.ingresos-gd,cubiertos:tot,ticket:tot>0?v.ingresos/tot:0};}).sort((a,b)=>b.ganancia-a.ganancia);
  const turnoCub={Mañana:0,Almuerzo:0,Tarde:0};
  Object.values(STATE.dias).forEach(v=>TURNOS.forEach(t=>turnoCub[t]+=v.turnos?.[t]?.cubiertos||0));
  const maxT=Math.max(...Object.values(turnoCub),1);
  const porMes={};
  Object.entries(STATE.dias).forEach(([f,v])=>{const m=f.slice(0,7);if(!porMes[m])porMes[m]={ingresos:0,gastos:0};porMes[m].ingresos+=v.ingresos;});
  STATE.gastos.forEach(g=>{const m=g.fecha?.slice(0,7);if(m){if(!porMes[m])porMes[m]={ingresos:0,gastos:0};porMes[m].gastos+=g.monto;}});
  return `<div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Cubiertos por turno (total)</p>
    ${TURNOS.map(t=>`<div class="bar-row">
      <span style="font-size:12px;color:${TURNO_COLOR[t]};font-weight:500;min-width:60px">${t}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${maxT>0?turnoCub[t]/maxT*100:0}%;background:${TURNO_COLOR[t]}"></div></div>
      <span style="font-size:14px;font-weight:500;min-width:32px;text-align:right">${fmt(turnoCub[t])}</span>
    </div>`).join("")}
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Días más rentables</p>
    ${porDia.length===0?`<p style="font-size:13px;color:#888">Sin datos aún</p>`:""}
    ${porDia.slice(0,5).map((d,i)=>`<div class="list-row">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:#aaa;min-width:20px">#${i+1}</span>
        <div><p style="font-size:13px;font-weight:500;margin:0">${d.fecha}</p><p style="font-size:11px;color:#888;margin:0">${d.cubiertos} cubiertos · ticket $${fmtD(d.ticket)}</p></div>
      </div>
      <span style="font-size:14px;font-weight:500;color:${d.ganancia>=0?"#10B981":"#EF4444'}"}">$${fmt(d.ganancia)}</span>
    </div>`).join("")}
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Evolución mensual</p>
    ${Object.keys(porMes).length===0?`<p style="font-size:13px;color:#888">Sin datos aún</p>`:""}
    ${Object.entries(porMes).sort().reverse().map(([m,v])=>{const[y,mo]=m.split("-"),gan=v.ingresos-v.gastos;return`<div style="padding:9px 0;border-bottom:.5px solid #f0f0f0">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:500">${MESES[parseInt(mo)-1]} ${y}</span>
        <span style="font-size:13px;font-weight:500;color:${gan>=0?"#10B981":"#EF4444"}">${gan>=0?"+":"-"}$${fmt(Math.abs(gan))}</span>
      </div>
      <div style="display:flex;gap:8px;font-size:11px;color:#888">
        <span>Ing: $${fmt(v.ingresos)}</span><span>·</span><span>Gas: $${fmt(v.gastos)}</span>
        ${v.ingresos>0?`<span>·</span><span>Margen: ${fmtD(gan/v.ingresos*100)}%</span>`:""}
      </div>
    </div>`;}).join("")}
  </div>`;
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────────
function renderHistorial(){
  return `<div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Días ${pill(Object.keys(STATE.dias).length,"#F59E0B")}</p>
    ${Object.keys(STATE.dias).length===0?`<p style="font-size:13px;color:#888">Sin días registrados</p>`:""}
    ${Object.entries(STATE.dias).sort().reverse().map(([f,v])=>{
      const tot=TURNOS.reduce((s,t)=>s+(v.turnos?.[t]?.cubiertos||0),0),medTot={Efectivo:0,Tarjeta:0,QR:0};
      TURNOS.forEach(t=>MEDIOS.forEach(m=>medTot[m]+=v.turnos?.[t]?.[m]||0));
      return `<div style="padding:10px 0;border-bottom:.5px solid #f0f0f0">

          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:14px;font-weight:500;color:#10B981">$${fmt(v.ingresos)}</span>

        <div style="display:flex;flex-wrap:wrap;gap:5px">

          ${MEDIOS.map(m=>medTot[m]>0?pill(`${MEDIO_ICON[m]}$${fmt(medTot[m])}`,MEDIO_COLOR[m]):"").join("")}

  <div class="card">

    ${STATE.gastos.length===0?`<p style="font-size:13px;color:#888">Sin gastos</p>`:""}
    ${STATE.gastos.slice(0,20).map(g=>`<div class="list-row">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="dot" style="background:${CAT_COLOR[g.categoria]||"#888"}"></div>
        <div><span style="font-size:13px;font-weight:500">${g.categoria}</span>${g.descripcion?`<p style="font-size:12px;color:#888;margin:0">${g.descripcion}</p>`:""}<span style="font-size:11px;color:#aaa">${g.fecha}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px;font-weight:500">$${fmt(g.monto)}</span>
        <button data-action="del-gasto" data-val="${g.id}" class="del-btn">×</button>
      </div>
    </div>`).join("")}
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin:0 0 12px">Retiros ${pill(STATE.retiros.length,"#8B5CF6")}</p>
    ${STATE.retiros.length===0?`<p style="font-size:13px;color:#888">Sin retiros</p>`:""}
    ${STATE.retiros.slice(0,20).map(r=>`<div class="list-row">
      <div><span style="font-size:13px;font-weight:500">${r.categoria}</span>${r.descripcion?`<p style="font-size:12px;color:#888;margin:0">${r.descripcion}</p>`:""}<span style="font-size:11px;color:#aaa">${r.fecha}</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px;font-weight:500;color:#8B5CF6">$${fmt(r.monto)}</span>
        <button data-action="del-retiro" data-val="${r.id}" class="del-btn">×</button>
      </div>
    </div>`).join("")}
  </div>`;
}

        <button data-action="add-vac" class="btn" style="width:100%;background:#10B981;margin-bottom:16px">+ Agregar período</button>
        ${(STATE.modalVac.vacaciones||[]).map(v=>{const dias=Math.round((new Date(v.hasta)-new Date(v.desde))/86400000)+1;return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-top:.5px solid #e5e5e5">
          <div style="flex:1"><p style="margin:0;font-size:13px;font-weight:500">${isoFecha(v.desde)} → ${isoFecha(v.hasta)}</p><p style="margin:0;font-size:11px;color:#888">${dias} día${dias!==1?"s":""}</p></div>
          <button data-action="del-vac" data-val="${v.id}" style="padding:4px 10px;font-size:12px;cursor:pointer;background:#FEE2E2;border:none;border-radius:8px;color:#DC2626">Eliminar</button>
        </div>`;}).join("")}
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button data-action="close-modal-vac" class="btn-outline">Cancelar</button>
          <button data-action="guardar-vac" class="btn" style="background:#F59E0B;padding:8px 18px">Guardar</button>
        </div>
      </div>
    </div>`;
  }
  // Modal movimiento
  if(STATE.modalMov){
    const emp=STATE.empleados.find(e=>e.id===STATE.modalMov.empId);
    html+=`<div class="modal-overlay">
      <div class="modal-box">
        <h3>Registrar movimiento</h3>
        <p style="font-size:13px;color:#888;margin:0 0 14px">${emp?.nombre} · ${mesLabel(STATE.modalMov.mes)}</p>
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <button data-action="set-mov-tipo" data-val="adelanto" class="btn" style="flex:1;background:${STATE.modalMovTipo==="adelanto"?"#EF4444":"#f5f5f5"};color:${STATE.modalMovTipo==="adelanto"?"#fff":"#888"};border:2px solid ${STATE.modalMovTipo==="adelanto"?"#EF4444":"#e5e5e5"}">Adelanto</button>
          <button data-action="set-mov-tipo" data-val="pago" class="btn" style="flex:1;background:${STATE.modalMovTipo==="pago"?"#10B981":"#f5f5f5"};color:${STATE.modalMovTipo==="pago"?"#fff":"#888"};border:2px solid ${STATE.modalMovTipo==="pago"?"#10B981":"#e5e5e5"}">Pago</button>
        </div>
        <div style="margin-bottom:10px"><label class="lbl">Medio de pago</label>
          <div style="display:flex;gap:8px">
            ${MEDIO_PAGO.map(m=>`<button data-action="set-mov-medio" data-val="${m}" style="flex:1;padding:8px 0;font-size:13px;cursor:pointer;border-radius:10px;border:1.5px solid ${STATE.modalMovMedio===m?"#3B82F6":"#e5e5e5"};background:${STATE.modalMovMedio===m?"#EFF6FF":"#fafafa"};color:${STATE.modalMovMedio===m?"#2563EB":"#888"};font-weight:${STATE.modalMovMedio===m?500:400}">${m}</button>`).join("")}
          </div>
        </div>
        <div style="margin-bottom:10px"><label class="lbl">Monto ($)</label><input type="number" data-bind="modalMovMonto" value="${STATE.modalMovMonto}" placeholder="0"></div>
        <div style="margin-bottom:14px"><label class="lbl">Nota (opcional)</label><input type="text" data-bind="modalMovNota" value="${STATE.modalMovNota}" placeholder="Ej: anticipo quincena"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button data-action="close-modal-mov" class="btn-outline">Cancelar</button>
          <button data-action="guardar-mov" class="btn" style="background:${STATE.modalMovTipo==="adelanto"?"#EF4444":"#10B981"};padding:8px 18px">Registrar</button>
        </div>
      </div>
    </div>`;
  }
  // Modal editar registro
  if(STATE.editReg){
    html+=`<div class="modal-overlay">
      <div class="modal-box">
        <h3>Editar turno</h3>
        ${[["entrada","Entrada"],["salida","Salida"]].map(([k,label])=>`<div style="margin-bottom:12px"><label class="lbl">${label}</label><input type="datetime-local" data-bind="editReg.${k}" value="${STATE.editReg[k]?STATE.editReg[k].slice(0,16):""}"></div>`).join("")}
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button data-action="close-edit-reg" class="btn-outline">Cancelar</button>
          <button data-action="guardar-edit-reg" class="btn" style="background:#F59E0B;padding:8px 18px">Guardar</button>
        </div>
      </div>
    </div>`;
  }
  return html;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function metricCard(label,value,color,sub=""){
  return `<div class="metric" style="background:${color}14">
    <div class="ml" style="color:${color}">${label}</div>
    <div class="mv">${value}</div>
    ${sub?`<div class="ms">${sub}</div>`:""}
  </div>`;
}

function barBalance(label,usado,total,colorOk="#10B981",colorEx="#EF4444"){
  const pct=total>0?Math.min(100,(usado/total)*100):0;
  const exceso=usado>total,color=exceso?colorEx:colorOk,saldo=total-usado;
  return `<div class="bar-balance">
    <div class="bl"><span style="color:#888">${label}</span><span style="font-weight:500;color:${color}">${usado}/${total} ${exceso?`(+${Math.abs(saldo)} exceso)`:`(${saldo} restantes)`}</span></div>
    <div class="bt"><div style="width:${pct}%;height:100%;background:${color};border-radius:99px"></div></div>
  </div>`;
}

// Handle select changes for fecha inputs
document.addEventListener("change",e=>{
  const t=e.target;
  if(t.id==="caj-fecha"){STATE.cajFecha=t.value;STATE.cajEditando={};const d=STATE.dias[STATE.cajFecha];STATE.cajForms={Mañana:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""},Almuerzo:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""},Tarde:{cubiertos:"",Efectivo:"",Tarjeta:"",QR:""}};if(d)TURNOS.forEach(tt=>{if(d.turnos?.[tt])STATE.cajForms[tt]={cubiertos:d.turnos[tt].cubiertos?.toString()||"",Efectivo:d.turnos[tt].Efectivo?.toString()||"",Tarjeta:d.turnos[tt].Tarjeta?.toString()||"",QR:d.turnos[tt].QR?.toString()||""};});R();}
  else if(t.id==="pers-mes"){STATE.persMes=t.value;R();}
  else if(t.id==="pers-anio"){STATE.persAnio=t.value;R();}
  else if(t.id==="bal-mes"){STATE.balMes=t.value;R();}
  else if(t.dataset.bind){
    const parts=t.dataset.bind.split(".");
    if(parts[0]==="gForm"){STATE.gForm[parts[1]]=t.value;R();}
    else if(parts[0]==="rForm"){STATE.rForm[parts[1]]=t.value;R();}
    else if(parts[0]==="modalEmp"&&STATE.modalEmp){STATE.modalEmp[parts[1]]=t.value;R();}
  }
});
</script>
